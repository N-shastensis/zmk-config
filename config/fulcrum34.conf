# Enable MPU
#CONFIG_ARM_MPU=y
#CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=125000000

# Enable reset by default
#CONFIG_RESET=y

# Enable clock control by default
#CONFIG_CLOCK_CONTROL=y

# Enable hardware stack protection
#CONFIG_HW_STACK_PROTECTION=y

# Enable GPIO
#CONFIG_GPIO=y
#CONFIG_GPIO_NRFX=y

# Defaults for matrix scanning to avoid interrupt issues
#CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# More ZMK
#CONFIG_ZMK_USB=y
#CONFIG_ZMK_USB_LOGGING=y
#CONFIG_ZMK_USB_BOOT=y
#CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
CONFIG_ZMK_MOUSE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_ZMK_BOARD_COMPAT=y

# Enable UART driver
#CONFIG_SERIAL=y

# Enable console
#CONFIG_CONSOLE=y
#CONFIG_UART_CONSOLE=y

# Build UF2 by default, supported by the Adafruit nRF52 Bootloader
#CONFIG_BUILD_OUTPUT_UF2=y
#CONFIG_BUILD_OUTPUT_HEX=y
#CONFIG_USE_DT_CODE_PARTITION=y

# Settings Support
#CONFIG_MPU_ALLOW_FLASH_WRITE=y
#CONFIG_NVS=y
#CONFIG_SETTINGS_NVS=y
#CONFIG_FLASH=y
#CONFIG_FLASH_PAGE_LAYOUT=y
#CONFIG_FLASH_MAP=y

# Bootloader Support
#CONFIG_RETAINED_MEM=y
#CONFIG_RETENTION=y
#CONFIG_RETENTION_BOOT_MODE=y
#CONFIG_ZMK_BOOTMODE_MAGIC_VALUE_BOOTLOADER_TYPE_ADAFRUIT_NRF52=y